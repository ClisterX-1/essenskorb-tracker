name: Essenskorb Checker München

on:
  schedule:
      - cron: '*/30 * * * *'
        workflow_dispatch:

        jobs:
          check:
              runs-on: ubuntu-latest
                  permissions:
                        contents: write
                            steps:
                                  - uses: actions/checkout@v4

                                        - name: Check for new baskets in München
                                                env:
                                                          NTFY_TOPIC: clisterx-food-bot
                                                                  run: |
                                                                            python3 << 'EOF'
                                                                                      import urllib.request, json, os

                                                                                                # München Bounding Box (ca. 20km Radius)
                                                                                                          LAT_MIN = 47.9
                                                                                                                    LAT_MAX = 48.35
                                                                                                                              LON_MIN = 11.3
                                                                                                                                        LON_MAX = 11.8
                                                                                                                                        
                                                                                                                                                  url = "https://foodsharing.de/api/map/markers/baskets"
                                                                                                                                                            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                                                                                                                                                                      with urllib.request.urlopen(req) as r:
                                                                                                                                                                                    all_baskets = json.loads(r.read())
                                                                                                                                                                                    
                                                                                                                                                                                              # Nur München-Körbe
                                                                                                                                                                                                        baskets = [
                                                                                                                                                                                                                      b for b in all_baskets
                                                                                                                                                                                                                                    if LAT_MIN <= b["lat"] <= LAT_MAX and LON_MIN <= b["lon"] <= LON_MAX
                                                                                                                                                                                                                                              ]
                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                        current_ids = {b["id"] for b in baskets}
                                                                                                                                                                                                                                                                  baskets_by_id = {b["id"]: b for b in baskets}
                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                            try:
                                                                                                                                                                                                                                                                                          with open("known_ids.json") as f:
                                                                                                                                                                                                                                                                                                            known_ids = set(json.load(f))
                                                                                                                                                                                                                                                                                                                      except:
                                                                                                                                                                                                                                                                                                                                    known_ids = set()
                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                              new_baskets = [baskets_by_id[i] for i in current_ids if i not in known_ids]
                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                        ntfy_topic = os.environ.get("NTFY_TOPIC", "")
                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                  for b in new_baskets:
                                                                                                                                                                                                                                                                                                                                                                                name = b["name"][:100].replace("\n", " ").strip()
                                                                                                                                                                                                                                                                                                                                                                                              msg = f"{name}"
                                                                                                                                                                                                                                                                                                                                                                                                            maps_link = f"https://www.google.com/maps?q={b['lat']},{b['lon']}"
                                                                                                                                                                                                                                                                                                                                                                                                                          req2 = urllib.request.Request(
                                                                                                                                                                                                                                                                                                                                                                                                                                            f"https://ntfy.sh/{ntfy_topic}",
                                                                                                                                                                                                                                                                                                                                                                                                                                                              data=msg.encode("utf-8"),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                headers={
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      "Title": "Neuer Essenskorb in München!",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "Tags": "basket,food",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  "Click": maps_link,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                urllib.request.urlopen(req2)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              print(f"Gesendet: {name}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with open("known_ids.json", "w") as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      json.dump(list(current_ids), f)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                print(f"München: {len(current_ids)} Körbe gesamt, {len(new_baskets)} neu")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Save updated IDs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git config user.email "action@github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git config user.name "GitHub Action"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git add known_ids.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git diff --staged --quiet || git commit -m "Update known basket IDs"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git push
